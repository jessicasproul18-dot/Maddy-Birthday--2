<!DOCTYPE html>
<html>
<head>
    <title>Happy Birthday Maddy!</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="banner-container">
        <div class="banner">
            <h1 id="typewriter"></h1>
        </div>
    </div>

    <div id="game-wrapper" style="position: relative; width: 100%; max-width: 800px; margin: 0 auto;">
        
        <div id="gameOverScreen" style="display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 20px; border: 4px solid #ff80ab; border-radius: 15px; text-align: center; z-index: 200; font-family: Arial; box-shadow: 0 0 20px rgba(0,0,0,0.2);">
            <h2 style="color: #f50057;">Happy Birthday Maddy! 🎂</h2>
            <p>Your Score: <span id="finalScore">0</span></p>
            <input type="text" id="initialsInput" maxlength="3" placeholder="MDY" style="width: 80px; text-align: center; font-size: 20px; margin-bottom: 10px; border: 2px solid #4caf50;"><br>
            <button id="saveBtn" style="padding: 10px 20px; background: #4caf50; border: none; color: white; border-radius: 5px; cursor: pointer; font-weight: bold;">Save & Restart</button>
            <hr style="margin: 15px 0; border: 0; border-top: 1px solid #eee;">
            <div id="leaderboardList"></div>
        </div>

        <img id="introCat" src="intro.gif" 
             style="position: absolute; width: 300px; z-index: 5; display: block;">

        <img id="gameCat" src="run.gif" 
             style="position: absolute; width: 100px; z-index: 5; display: none;">

        <canvas id="gameCanvas" style="position: relative; z-index: 1;"></canvas>
    </div>

    <button id="startButton" style="display: none;">Start Game!</button>

    <script src="script.js"></script>
</body>
</html>
